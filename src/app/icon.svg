<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0d2a1a"/>
  <g fill="#f5c542">
    <!-- globe held aloft at the top -->
    <circle cx="32" cy="14" r="7"/>
    <!-- spiralling twin-figure body of the FIFA World Cup trophy -->
    <path d="M32 20
             C 35 23 43 26 43 35
             C 43 42 37 46 33 48
             L 33 49
             C 38 49 41 50 42 52
             L 22 52
             C 23 50 26 49 31 49
             L 31 48
             C 27 46 21 42 21 35
             C 21 26 29 23 32 20 Z"/>
    <!-- two-tier round base -->
    <rect x="23" y="52" width="18" height="4" rx="2"/>
    <rect x="26.5" y="56" width="11" height="3.5" rx="1.75"/>
  </g>
  <!-- globe meridians (cut out in the background colour) -->
  <g fill="none" stroke="#0d2a1a" stroke-width="1.1" opacity="0.65">
    <ellipse cx="32" cy="14" rx="3" ry="7"/>
    <line x1="25.5" y1="14" x2="38.5" y2="14"/>
  </g>
</svg>
