<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>

  <!-- big "26" behind the trophy -->
  <g fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="38">
    <text x="1" y="44">2</text>
    <text x="37" y="44">6</text>
  </g>

  <!-- FIFA World Cup trophy, gold, centred over the numbers -->
  <g fill="#e7b53b">
    <circle cx="32" cy="13" r="6.2"/>
    <path d="M32 18
             C 34.5 20.5 41 23 41 31
             C 41 37 36 40.5 33 42.5
             L 33 44
             C 37 44 39.5 45 40.5 47
             L 23.5 47
             C 24.5 45 27 44 31 44
             L 31 42.5
             C 28 40.5 23 37 23 31
             C 23 23 29.5 20.5 32 18 Z"/>
    <rect x="24.5" y="47" width="15" height="3.4" rx="1.7"/>
    <rect x="27.5" y="50.5" width="9" height="3" rx="1.5"/>
  </g>
  <!-- globe meridians cut out -->
  <g fill="none" stroke="#0a0a0a" stroke-width="1" opacity="0.6">
    <ellipse cx="32" cy="13" rx="2.6" ry="6.2"/>
    <line x1="26" y1="13" x2="38" y2="13"/>
  </g>

  <!-- FIFA wordmark -->
  <text x="32" y="61" text-anchor="middle" fill="#ffffff"
        font-family="Arial, Helvetica, sans-serif" font-weight="900"
        font-size="7" letter-spacing="0.5">FIFA</text>
</svg>
